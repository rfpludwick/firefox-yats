<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>YATS Options</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #1d2433;
      background: #fff;
      padding: 8px 4px 16px;
      max-width: 520px;
    }
    h1 { font-size: 1.15rem; margin: 0 0 8px; }
    p { margin: 0 0 10px; }
    code, kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9em;
      background: #f0f2f7;
      color: inherit;
      padding: 1px 6px;
      border-radius: 4px;
    }
    ol { margin: 0; padding-left: 1.3em; }
    li { margin-bottom: 6px; }
    @media (prefers-color-scheme: dark) {
      body { color: #f0f2f5; background: #1c1c1e; }
      code, kbd { background: #2c2c2e; }
    }
  </style>
</head>
<body>
  <h1>Keyboard shortcut</h1>
  <p>
    Default: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Space</kbd>
    (on macOS: <kbd>Control</kbd>+<kbd>Shift</kbd>+<kbd>Space</kbd>).
  </p>
  <p>To change it:</p>
  <ol>
    <li>Open <code>about:addons</code></li>
    <li>Click the gear icon and choose <strong>Manage Extension Shortcuts</strong></li>
    <li>Set a new shortcut for <strong>YATS</strong></li>
  </ol>
  <p>
    You can also open the switcher by clicking the YATS toolbar icon.
  </p>
</body>
</html>
